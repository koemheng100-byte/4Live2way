<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4LIVE 2WAY - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#060913] text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="bg-[#111625] border border-white/10 rounded-2xl p-6 w-full max-w-md shadow-2xl my-8">
        <h2 class="text-xl font-black text-center text-cyan-400 mb-6">ផ្ទាំងគ្រប់គ្រង និងបើកសិទ្ធិ (Admin)</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-slate-400 font-bold mb-1 uppercase">Admin Password</label>
                <input type="password" id="password" value="123456789" class="w-full bg-white/5 border border-white/10 p-2.5 rounded-xl text-sm focus:outline-none focus:border-cyan-500 font-mono">
            </div>
            <div>
                <label class="block text-xs text-slate-400 font-bold mb-1 uppercase">User ID (ពីភ្ញៀវ)</label>
                <input type="text" id="userId" placeholder="ឧទាហរណ៍៖ ID-X7R2B9M" class="w-full bg-white/5 border border-white/10 p-2.5 rounded-xl text-sm focus:outline-none focus:border-cyan-500 font-mono uppercase">
            </div>
            <div>
                <label class="block text-xs text-slate-400 font-bold mb-1 uppercase">រយៈពេល (ចំនួនថ្ងៃ)</label>
                <select id="days" class="w-full bg-[#111625] border border-white/10 p-2.5 rounded-xl text-sm focus:outline-none focus:border-cyan-500">
                    <option value="1">1 ថ្ងៃ</option>
                    <option value="7">7 ថ្ងៃ (1 សប្តាហ៍)</option>
                    <option value="30" selected>30 ថ្ងៃ (1 ខែ)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-slate-400 font-bold mb-1 uppercase">Gemini API Key (ទុកទទេបើប្រើ Key រួម)<span id="default-key" class="text-cyan-400 font-mono lowercase"></span></label>
                <input type="text" id="apiKey" placeholder="AIzaSy..." class="w-full bg-white/5 border border-white/10 p-2.5 rounded-xl text-sm focus:outline-none focus:border-cyan-500 font-mono">
            </div>
            
            <button onclick="activateUser()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:brightness-110 py-3 rounded-xl font-bold text-sm shadow-lg shadow-cyan-500/20 transition-all active:scale-95 mt-2">
                បើកសិទ្ធិប្រើប្រាស់ (Activate)
            </button>

            <hr class="my-6 border-white/10">

            <button onclick="loadUsers()" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:brightness-110 py-3 rounded-xl font-bold text-sm shadow-lg shadow-emerald-500/20 transition-all active:scale-95">
                មើល User ទាំងអស់
            </button>

            <div id="stats" class="grid grid-cols-3 gap-2 mt-3 text-center text-xs font-bold"></div>

            <input
                id="searchUser"
                placeholder="ស្វែងរក User ID..."
                oninput="loadUsers()"
                class="w-full bg-white/5 border border-white/10 p-2.5 rounded-xl mb-3 text-sm focus:outline-none focus:border-cyan-500 mt-3"
            />

            <div id="usersList" class="mt-4 text-xs space-y-3 max-h-[400px] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <script>
        function activateUser() {
            const password = document.getElementById('password').value;
            const userId = document.getElementById('userId').value.trim();
            const days = parseInt(document.getElementById('days').value);
            const geminiApiKey = document.getElementById('apiKey').value.trim();

            if(!userId) return alert("សូមបំពេញ User ID របស់ភ្ញៀវ!");

            fetch('/api/admin/set-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    password, 
                    userId, 
                    days, 
                    geminiApiKey: geminiApiKey || undefined 
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    alert("បរាជ័យ៖ " + data.error);
                } else {
                    alert("ជោគជ័យ៖ បានបើកសិទ្ធិជូន ID " + userId + " រួចរាល់!");
                    document.getElementById('userId').value = "";
                    if(document.getElementById('usersList').innerHTML !== "") {
                        loadUsers();
                    }
                }
            })
            .catch(err => alert("មានបញ្ហាការតភ្ជាប់ទៅកាន់ Server៖ " + err));
        }

        // បានកែប្រែអនុគមន៍ loadUsers() តាមការណែនាំរបស់អ្នក
        function loadUsers() {
            const password = document.getElementById('password').value;

            fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) { alert(data.error); return; }
                
                // បន្ថែមបន្ទាត់នេះ ដើម្បីបង្ហាញ API Key ទៅលើចំណងជើង UI
                if(document.getElementById("default-key")){
                    document.getElementById("default-key").innerText = " (" + (data.envApiKey || 'No Default Key') + ")";
                }

                // បង្ហាញ Summary Card
                document.getElementById("stats").innerHTML = `
                <div class="bg-cyan-600/20 text-cyan-400 border border-cyan-500/30 p-2 rounded-xl">
                  <div class="text-base font-mono">${data.totalUsers || 0}</div>
                  <small class="text-[10px] text-slate-400 uppercase">Total</small>
                </div>
                <div class="bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 p-2 rounded-xl">
                  <div class="text-base font-mono">${data.activeUsers || 0}</div>
                  <small class="text-[10px] text-slate-400 uppercase">Active</small>
                </div>
                <div class="bg-rose-600/20 text-rose-400 border border-rose-500/30 p-2 rounded-xl">
                  <div class="text-base font-mono">${data.expiredUsers || 0}</div>
                  <small class="text-[10px] text-slate-400 uppercase">Expired</small>
                </div>
                `;

                let html = '';
                
                if(!data.users || data.users.length === 0) {
                    html = '<div class="text-center text-slate-500 py-4">មិនទាន់មានទិន្នន័យ User ឡើយ</div>';
                } else {
                    const keyword = document.getElementById("searchUser").value.toLowerCase();

                    data.users
                    .filter(user => user.userId.toLowerCase().includes(keyword))
                    .forEach(user => {
                        const active = new Date(user.expiredAt).getTime() > Date.now();
                        const statusText = active ? "Active" : "Expired";
                        const statusColor = active ? "bg-green-500/20 text-green-400 border border-green-500/30" : "bg-red-500/20 text-red-400 border border-red-500/30";

                        html += `
                        <div class="bg-white/5 border border-white/10 p-3.5 rounded-xl space-y-2">
                            <div class="flex justify-between items-center">
                                <b class="text-cyan-400 font-mono text-sm">${user.userId}</b>
                                <span class="${statusColor} px-2 py-0.5 rounded-full text-[10px] font-medium">
                                    ${statusText}
                                </span>
                            </div>
                            <div class="text-slate-300 space-y-0.5">
                                <div><span class="text-slate-500">Expire:</span> <span class="font-mono text-amber-400">${new Date(user.expiredAt).toLocaleString()}</span></div>
                                <div class="truncate flex items-center gap-1"><span class="text-slate-500">API:</span> 
                                    <div class="flex items-center gap-2">
                                        <button onclick="editApiKey('${user.userId}')" class="bg-blue-600 px-2 py-1 rounded text-[10px]">✏️</button>
                                        <span class="font-mono text-slate-400">${user.apiDisplay}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1">
                                    <span class="text-slate-500">Plan:</span>
                                    <div class="flex items-center gap-2">
                                        <button onclick="editPlan('${user.userId}')" class="bg-yellow-600 px-2 py-1 rounded text-[10px]">✏️</button>
                                        <span class="text-cyan-400 font-medium">${user.plan || '30 Days'}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-1.5 pt-1">
                                <button onclick="reactivateUser('${user.userId}')" class="bg-green-600/20 text-green-400 border border-green-500/20 hover:bg-green-600 hover:text-white py-1.5 rounded-lg font-medium transition-all text-[11px]">
                                    Activate
                                </button>
                                <button onclick="editApiKey('${user.userId}')" class="bg-blue-600/20 text-blue-400 border border-blue-500/20 hover:bg-blue-600 hover:text-white py-1.5 rounded-lg font-medium transition-all text-[11px]">
                                    Edit API
                                </button>
                                <button onclick="suspendUser('${user.userId}')" class="bg-yellow-600/20 text-yellow-400 border border-yellow-500/20 hover:bg-yellow-600 hover:text-white py-1.5 rounded-lg font-medium transition-all text-[11px]">
                                    Suspend
                                </button>
                                <button onclick="deleteUser('${user.userId}')" class="bg-rose-600/20 text-rose-400 border border-rose-500/20 hover:bg-rose-600 hover:text-white py-1.5 rounded-lg font-medium transition-all text-[11px]">
                                    Delete
                                </button>
                            </div>
                        </div>
                        `;
                    });
                }

                document.getElementById('usersList').innerHTML = html;
            })
            .catch(err => alert("មានបញ្ហាទាញយកទិន្នន័យ៖ " + err));
        }

        function suspendUser(userId) {
            const password = document.getElementById('password').value;

            fetch('/api/admin/suspend-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, userId })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) alert(data.error);
                loadUsers();
            })
            .catch(() => loadUsers());
        }

        function reactivateUser(userId) {
            const password = document.getElementById('password').value;

            fetch('/api/admin/reactivate-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password,
                    userId,
                    days: 30
                })
            })
            .then(r => r.json())
            .then(data => {
                if(data.error) alert(data.error);
                loadUsers();
            })
            .catch(() => loadUsers());
        }

        function editApiKey(userId){
            const newKey = prompt("បញ្ចូល API Key ថ្មី");
            if(!newKey) return;

            const password = document.getElementById("password").value;

            fetch("/api/admin/update-api-key",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    password,
                    userId,
                    geminiApiKey: newKey
                })
            })
            .then(r=>r.json())
            .then(data => {
                if(data.error) alert(data.error);
                loadUsers();
            })
            .catch(() => loadUsers());
        }

        function editPlan(userId){
            const plan = prompt("1 Days / 1Week / 1Month");
            if(!plan) return;

            const password = document.getElementById("password").value;

            fetch("/api/admin/update-plan",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    password,
                    userId,
                    plan
                })
            })
            .then(()=>loadUsers());
        }

        function deleteUser(userId) {
            if(!confirm("តើអ្នកពិតជាចង់លុប User ID: " + userId + " នេះមែនទេ?")) return;

            const password = document.getElementById('password').value;

            fetch('/api/admin/delete-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, userId })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) alert(data.error);
                loadUsers();
            })
            .catch(() => loadUsers());
        }
    </script>
</body>
</html>
